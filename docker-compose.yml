version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: habitly-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: habitly
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5434:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./api/sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  api:
    build:
      context: ./api
    container_name: habitly-api
    restart: unless-stopped
    depends_on:
      - db
    environment:
      NODE_ENV: development
      PORT: 3333
      DATABASE_URL: postgres://postgres:postgres@db:5432/habitly
      JWT_SECRET: ${JWT_SECRET}
      CLIENT_URL: http://localhost:8081
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
    ports:
      - '3333:3333'
    volumes:
      - ./api:/app
      - /app/node_modules
    command: npm run dev

  mobile:
    build:
      context: ./mobile
    container_name: habitly-mobile
    restart: unless-stopped
    depends_on:
      - api
    environment:
      EXPO_PUBLIC_API_URL: http://localhost:3333
      EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID: ${EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID}
      EXPO_PUBLIC_GITHUB_CLIENT_ID: ${EXPO_PUBLIC_GITHUB_CLIENT_ID}
    ports:
      - '8081:8081'
      - '19000:19000'
      - '19001:19001'
      - '19002:19002'
    volumes:
      - ./mobile:/app
      - /app/node_modules
    command: npm run start -- --host 0.0.0.0 --port 8081

volumes:
  postgres_data:
